<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>1Mapeador de Contratos - Edição Rigorosa</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
    <div class="toolbar">
        <label for="file-upload" class="btn-upload">📁 Carregar Contrato Word</label>
        <input type="file" id="file-upload" accept=".docx" style="display:none">
        <span id="file-name" class="file-name">Nenhum arquivo selecionado</span>
    </div>
    
    <div class="main-split-view">
        <div id="doc-column" class="column">
            <div id="doc-pages-container"></div>
        </div>
        <div id="report-column" class="column">
            <div id="report-pages-container"></div>
        </div>
    </div>

    <div id="context-menu" class="context-menu hidden">
        <div id="main-options">
            <p style="font-size: 12px; color: #666; margin-bottom: 5px; padding: 0 8px;">Vincular como:</p>
            <button class="menu-btn" onclick="showSubOptions('empresa')">Empresa ❯</button>
            <button class="menu-btn" onclick="showSubOptions('colaborador')">Colaborador ❯</button>
        </div>

        <div id="sub-options" class="hidden">
            <button id="back-btn" class="menu-btn" onclick="showMainMenu()" style="color: #2563eb; font-weight: bold; border-bottom: 1px solid #eee;">❮ Voltar</button>
            <div id="items-list"></div>
        </div>
    </div>

    <div id="script-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Script Gerado</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <textarea id="script-output" readonly></textarea>
            <button class="btn-copy" onclick="copyScript()">📋 Copiar Código</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
